<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FALLET</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --cream:#F2EEE4;
  --cream-dark:#E8E3D7;
  --ink:#1A1A18;
  --ink-soft:#8A8680;
  --green:#2D6A4F;
  --red:#B83228;
  --white:#FFFFFF;
  --border:#DDD9CF;
  --radius:14px;
}

html,body{
  font-family:'Space Grotesk',sans-serif;
  background:var(--cream);
  color:var(--ink);
  min-height:100vh;
  max-width:430px;
  margin:0 auto;
  overscroll-behavior:none;
}

/* ── HEADER ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 12px;
  position:sticky;top:0;
  background:var(--cream);
  z-index:20;
  border-bottom:1px solid var(--border);
}
.logo-img{height:24px;display:block}

.month-pill{
  display:flex;align-items:center;gap:4px;
  background:var(--white);
  border:1px solid var(--border);
  border-radius:20px;
  padding:5px 10px;
}
.month-pill button{
  background:none;border:none;cursor:pointer;
  color:var(--ink-soft);font-size:15px;line-height:1;padding:0 1px;
}
.month-pill button:hover{color:var(--ink)}
.month-text{
  font-family:'Space Mono',monospace;
  font-size:10px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;
  color:var(--ink);min-width:58px;text-align:center;
}

/* ── TABS ── */
.tabs{
  display:flex;padding:10px 16px 0;
  gap:0;overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  font-family:'Space Mono',monospace;
  font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  padding:7px 13px;border:1px solid var(--border);
  background:transparent;color:var(--ink-soft);cursor:pointer;
  white-space:nowrap;transition:all .15s;
}
.tab:first-child{border-radius:8px 0 0 8px}
.tab:last-child{border-radius:0 8px 8px 0}
.tab:not(:first-child){border-left:none}
.tab.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}

/* ── CONTENT ── */
.content{padding:14px 16px 88px}
.page{display:none}.page.active{display:block}

/* ── BALANCE CARD ── */
.bal-card{
  background:var(--ink);border-radius:var(--radius);
  padding:18px 20px 20px;margin-bottom:10px;
  position:relative;overflow:hidden;
}
.bal-card::after{
  content:'';position:absolute;
  width:140px;height:140px;border-radius:50%;
  background:rgba(255,255,255,.04);
  top:-40px;right:-40px;pointer-events:none;
}
.bal-label{
  font-family:'Space Mono',monospace;
  font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(242,238,228,.45);margin-bottom:8px;
}
.bal-amount{
  font-size:42px;font-weight:700;letter-spacing:-2px;line-height:1;
  color:#F2EEE4;display:flex;align-items:baseline;gap:3px;
}
.bal-amount.neg{color:#FF8A80}
.bal-sign{font-size:28px;font-weight:400;opacity:.55}
.bal-eur{font-size:26px;font-weight:400;opacity:.55;margin-right:1px}

/* ── STAT ROW ── */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.stat-card{
  background:var(--white);border-radius:var(--radius);
  padding:12px 14px;border:1px solid var(--border);
}
.stat-card.inc{border-top:2px solid var(--green)}
.stat-card.exp{border-top:2px solid var(--red)}
.stat-lbl{
  font-family:'Space Mono',monospace;
  font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--ink-soft);margin-bottom:4px;
}
.stat-amt{font-size:20px;font-weight:700;letter-spacing:-.5px;line-height:1}
.stat-card.inc .stat-amt{color:var(--green)}
.stat-card.exp .stat-amt{color:var(--red)}
.stat-sub{margin-top:8px;display:flex;flex-direction:column;gap:3px}
.stat-sub-row{display:flex;justify-content:space-between}
.stat-sub-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--ink-soft)}
.stat-sub-val{font-size:11px;font-weight:600;color:var(--ink)}

/* ── SECTION TITLE ── */
.sec-title{
  font-family:'Space Mono',monospace;
  font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--ink-soft);margin:18px 0 8px;
}

/* ── BREAKDOWN ── */
.bk-list{display:flex;flex-direction:column;gap:6px}
.bk-item{
  background:var(--white);border-radius:10px;
  padding:11px 13px;border:1px solid var(--border);
}
.bk-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.bk-cat{font-size:13px;font-weight:600}
.bk-amt{font-size:13px;font-weight:700}
.bk-amt.inc{color:var(--green)}.bk-amt.exp{color:var(--red)}
.bk-bar{height:3px;background:var(--cream-dark);border-radius:2px;overflow:hidden}
.bk-fill{height:100%;border-radius:2px;transition:width .5s}
.bk-fill.inc{background:var(--green)}.bk-fill.exp{background:var(--red)}

/* ── HISTORY ── */
.hist-list{display:flex;flex-direction:column;gap:5px}
.hist-item{
  background:var(--white);border-radius:10px;
  padding:10px 13px;border:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:background .1s;
}
.hist-item:active{background:var(--cream-dark)}
.hist-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hist-dot.inc{background:var(--green)}.hist-dot.exp{background:var(--red)}
.hist-info{flex:1;min-width:0}
.hist-cat{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-meta{font-family:'Space Mono',monospace;font-size:9px;color:var(--ink-soft);margin-top:1px}
.hist-right{text-align:right;flex-shrink:0}
.hist-amt{font-size:13px;font-weight:700;letter-spacing:-.3px}
.hist-amt.inc{color:var(--green)}.hist-amt.exp{color:var(--red)}
.hist-method{font-family:'Space Mono',monospace;font-size:9px;color:var(--ink-soft);margin-top:1px}

/* ── COMPARE ── */
.cmp-totals{
  background:var(--white);border-radius:var(--radius);
  border:1px solid var(--border);overflow:hidden;margin-bottom:10px;
}
.cmp-total-row{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  padding:12px 14px;align-items:center;
}
.cmp-total-row+.cmp-total-row{border-top:1px solid var(--border)}
.cmp-total-label{font-size:12px;font-weight:600;color:var(--ink)}
.cmp-total-val{font-size:14px;font-weight:700;text-align:right}
.cmp-total-val.inc{color:var(--green)}.cmp-total-val.exp{color:var(--red)}
.cmp-total-val.neu{color:var(--ink)}
.cmp-month-head{
  font-family:'Space Mono',monospace;
  font-size:9px;color:var(--ink-soft);letter-spacing:.5px;
  padding:8px 14px 0;display:grid;grid-template-columns:1fr 1fr 1fr;
}
.cmp-month-head span:not(:first-child){text-align:right}
.cmp-delta{
  font-family:'Space Mono',monospace;font-size:9px;font-weight:700;
}
.cmp-delta.up{color:var(--green)}.cmp-delta.down{color:var(--red)}

.cmp-cat-list{display:flex;flex-direction:column;gap:5px}
.cmp-cat-item{
  background:var(--white);border-radius:10px;
  border:1px solid var(--border);overflow:hidden;
}
.cmp-cat-row{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  padding:10px 13px;align-items:center;
}
.cmp-cat-name{font-size:13px;font-weight:600}
.cmp-cat-val{font-size:13px;font-weight:700;text-align:right}
.cmp-cat-val.inc{color:var(--green)}.cmp-cat-val.exp{color:var(--red)}

/* ── FAB ── */
.fab{
  position:fixed;bottom:22px;right:16px;
  width:50px;height:50px;border-radius:50%;
  background:var(--ink);color:var(--cream);
  border:none;font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.22);
  z-index:100;transition:transform .15s;
}
.fab:active{transform:scale(.92)}

/* ── MODAL ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.45);z-index:200;
  align-items:flex-end;justify-content:center;
}
.overlay.open{display:flex}
.modal{
  background:var(--cream);
  border-radius:20px 20px 0 0;
  padding:16px 16px 36px;
  width:100%;max-width:430px;
  max-height:88vh;overflow-y:auto;
  animation:up .22s ease;
}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:32px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.modal-title{font-size:16px;font-weight:700;letter-spacing:-.3px;margin-bottom:16px}

/* ── FORM ── */
.fg{margin-bottom:13px}
.fg-label{
  font-family:'Space Mono',monospace;
  font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  color:var(--ink-soft);margin-bottom:5px;display:block;
}
.fg-input{
  width:100%;padding:11px 13px;
  background:var(--white);border:1px solid var(--border);
  border-radius:10px;font-family:'Space Grotesk',sans-serif;
  font-size:15px;color:var(--ink);outline:none;
  transition:border-color .15s;
}
.fg-input:focus{border-color:var(--ink)}

/* segmented */
.seg{display:flex}
.seg-btn{
  flex:1;padding:10px 6px;
  border:1px solid var(--border);
  background:var(--white);cursor:pointer;
  font-family:'Space Mono',monospace;
  font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  color:var(--ink-soft);transition:all .12s;
}
.seg-btn:first-child{border-radius:10px 0 0 10px}
.seg-btn:last-child{border-radius:0 10px 10px 0}
.seg-btn:not(:first-child){border-left:none}
.seg-btn.on-inc{background:var(--green);color:#fff;border-color:var(--green)}
.seg-btn.on-exp{background:var(--red);color:#fff;border-color:var(--red)}
.seg-btn.on-dark{background:var(--ink);color:var(--cream);border-color:var(--ink)}

/* cat grid */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.cat-btn{
  padding:8px 4px;border:1px solid var(--border);
  background:var(--white);border-radius:8px;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;
  font-size:12px;font-weight:600;color:var(--ink-soft);
  text-align:center;transition:all .12s;
}
.cat-btn.on{background:var(--ink);color:var(--cream);border-color:var(--ink)}

/* buttons */
.btn-main{
  width:100%;padding:13px;
  background:var(--ink);color:var(--cream);
  border:none;border-radius:12px;
  font-family:'Space Grotesk',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:opacity .15s;margin-top:4px;
}
.btn-main:active{opacity:.85}
.btn-danger{background:var(--red)}
.btn-row{display:flex;gap:7px;margin-top:7px}
.btn-sec{
  flex:1;padding:12px;background:transparent;
  color:var(--ink-soft);border:1px solid var(--border);
  border-radius:12px;font-family:'Space Grotesk',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:84px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--ink);color:var(--cream);
  padding:9px 16px;border-radius:18px;
  font-size:12px;font-weight:600;
  opacity:0;transition:all .25s;
  z-index:300;white-space:nowrap;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── UTIL ── */
.spin{text-align:center;padding:36px 0;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft)}
.spin span{display:inline-block;animation:blink 1.2s infinite}
.spin span:nth-child(2){animation-delay:.2s}.spin span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.15}40%{opacity:1}}
.empty{text-align:center;padding:30px 0;font-size:13px;color:var(--ink-soft)}
</style>
</head>
<body>

<div class="header">
  <img src="FALLET-wordmark-light.png" class="logo-img" alt="FALLET">
  <div class="month-pill">
    <button id="prev-m">‹</button>
    <div class="month-text" id="month-lbl">—</div>
    <button id="next-m">›</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="overview">Баланс</button>
  <button class="tab" data-tab="breakdown">Разбивка</button>
  <button class="tab" data-tab="history">История</button>
  <button class="tab" data-tab="compare">Сравнение</button>
</div>

<div class="content">
  <div class="page active" id="page-overview"><div class="spin">Загрузка<span>.</span><span>.</span><span>.</span></div></div>
  <div class="page" id="page-breakdown"><div class="spin">Загрузка<span>.</span><span>.</span><span>.</span></div></div>
  <div class="page" id="page-history"><div class="spin">Загрузка<span>.</span><span>.</span><span>.</span></div></div>
  <div class="page" id="page-compare"><div class="spin">Загрузка<span>.</span><span>.</span><span>.</span></div></div>
</div>

<button class="fab" id="fab">+</button>

<!-- ADD -->
<div class="overlay" id="ov-add">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Новая запись</div>
    <div class="fg">
      <label class="fg-label">Тип</label>
      <div class="seg">
        <button class="seg-btn on-inc" id="a-inc">Доход</button>
        <button class="seg-btn" id="a-exp">Расход</button>
      </div>
    </div>
    <div class="fg">
      <label class="fg-label">Категория</label>
      <div class="cat-grid" id="a-cats"></div>
    </div>
    <div class="fg">
      <label class="fg-label">Способ оплаты</label>
      <div class="seg">
        <button class="seg-btn on-dark" id="a-card">Карта</button>
        <button class="seg-btn" id="a-cash">Наличные</button>
      </div>
    </div>
    <div class="fg">
      <label class="fg-label">Сумма €</label>
      <input class="fg-input" type="number" inputmode="decimal" placeholder="0.00" id="a-amount" step="0.01" min="0">
    </div>
    <div class="fg">
      <label class="fg-label">Комментарий (необязательно)</label>
      <input class="fg-input" type="text" placeholder="Например, фамилия" id="a-comment">
    </div>
    <button class="btn-main" id="a-save">Сохранить</button>
    <div class="btn-row"><button class="btn-sec" id="a-cancel">Отмена</button></div>
  </div>
</div>

<!-- EDIT -->
<div class="overlay" id="ov-edit">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Редактировать</div>
    <div class="fg">
      <label class="fg-label">Тип</label>
      <div class="seg">
        <button class="seg-btn" id="e-inc">Доход</button>
        <button class="seg-btn" id="e-exp">Расход</button>
      </div>
    </div>
    <div class="fg">
      <label class="fg-label">Категория</label>
      <div class="cat-grid" id="e-cats"></div>
    </div>
    <div class="fg">
      <label class="fg-label">Способ оплаты</label>
      <div class="seg">
        <button class="seg-btn" id="e-card">Карта</button>
        <button class="seg-btn" id="e-cash">Наличные</button>
      </div>
    </div>
    <div class="fg">
      <label class="fg-label">Сумма €</label>
      <input class="fg-input" type="number" inputmode="decimal" placeholder="0.00" id="e-amount" step="0.01" min="0">
    </div>
    <div class="fg">
      <label class="fg-label">Комментарий</label>
      <input class="fg-input" type="text" placeholder="Необязательно" id="e-comment">
    </div>
    <button class="btn-main" id="e-save">Сохранить изменения</button>
    <div class="btn-row">
      <button class="btn-sec btn-danger" id="e-del" style="color:#fff;background:var(--red);border-color:var(--red)">Удалить</button>
      <button class="btn-sec" id="e-cancel">Отмена</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API='https://start-production-e59e.up.railway.app';
const KEY='fallet2026';
const MRU=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const INC_CATS=['Work','Badminton','Other'];
const EXP_CATS=['Fixed','Family','Transport','Personal','Other'];

let Y=new Date().getFullYear(),M=new Date().getMonth()+1;
let cache={};
let eId=null,aType='income',aCat='Work',aMethod='card',eType='income',eCat='Work',eMethod='card';

const fmt=n=>new Intl.NumberFormat('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
const spin=()=>'<div class="spin">Загрузка<span>.</span><span>.</span><span>.</span></div>';
const toast=msg=>{const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)};
const updMonth=()=>document.getElementById('month-lbl').textContent=MRU[M-1].substring(0,3).toUpperCase()+' '+Y;
const clrCache=()=>cache={};

async function api(path,opts={}){
  const sep=path.includes('?')? '&':'?';
  const url=`${API}${path}${opts.method?'':sep+'key='+KEY}`;
  const r=await fetch(url,{...opts,headers:{'X-API-Key':KEY,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok) throw new Error(r.status);
  return r.json();
}

/* ── OVERVIEW ── */
async function loadOverview(){
  const el=document.getElementById('page-overview');
  el.innerHTML=spin();
  try{
    const d=await api(`/api/summary?year=${Y}&month=${M}`);
    const b=d.balance;
    el.innerHTML=`
    <div class="bal-card">
      <div class="bal-label">Баланс месяца</div>
      <div class="bal-amount${b<0?' neg':''}">
        <span class="bal-sign">${b<0?'−':'+'}</span><span class="bal-eur">€</span>${fmt(Math.abs(b))}
      </div>
    </div>
    <div class="stat-row">
      <div class="stat-card inc">
        <div class="stat-lbl">Доходы</div>
        <div class="stat-amt">€${fmt(d.income.total)}</div>
        <div class="stat-sub">
          <div class="stat-sub-row"><span class="stat-sub-lbl">КАРТА</span><span class="stat-sub-val">€${fmt(d.income.card)}</span></div>
          <div class="stat-sub-row"><span class="stat-sub-lbl">НАЛ</span><span class="stat-sub-val">€${fmt(d.income.cash)}</span></div>
        </div>
      </div>
      <div class="stat-card exp">
        <div class="stat-lbl">Расходы</div>
        <div class="stat-amt">€${fmt(d.expense.total)}</div>
        <div class="stat-sub">
          <div class="stat-sub-row"><span class="stat-sub-lbl">КАРТА</span><span class="stat-sub-val">€${fmt(d.expense.card)}</span></div>
          <div class="stat-sub-row"><span class="stat-sub-lbl">НАЛ</span><span class="stat-sub-val">€${fmt(d.expense.cash)}</span></div>
        </div>
      </div>
    </div>`;
  }catch{el.innerHTML='<div class="empty">Не удалось загрузить</div>'}
}

/* ── BREAKDOWN ── */
async function loadBreakdown(){
  const el=document.getElementById('page-breakdown');
  el.innerHTML=spin();
  try{
    const d=await api(`/api/breakdown?year=${Y}&month=${M}`);
    const ie=Object.entries(d.income||{}).sort((a,b)=>b[1]-a[1]);
    const ee=Object.entries(d.expense||{}).sort((a,b)=>b[1]-a[1]);
    const mi=ie.length?ie[0][1]:1, me=ee.length?ee[0][1]:1;
    let h='';
    if(ie.length){
      h+='<div class="sec-title">Доходы</div><div class="bk-list">';
      for(const[c,a]of ie)h+=`<div class="bk-item"><div class="bk-header"><span class="bk-cat">${c}</span><span class="bk-amt inc">+€${fmt(a)}</span></div><div class="bk-bar"><div class="bk-fill inc" style="width:${Math.round(a/mi*100)}%"></div></div></div>`;
      h+='</div>';
    }
    if(ee.length){
      h+='<div class="sec-title">Расходы</div><div class="bk-list">';
      for(const[c,a]of ee)h+=`<div class="bk-item"><div class="bk-header"><span class="bk-cat">${c}</span><span class="bk-amt exp">−€${fmt(a)}</span></div><div class="bk-bar"><div class="bk-fill exp" style="width:${Math.round(a/me*100)}%"></div></div></div>`;
      h+='</div>';
    }
    el.innerHTML=h||'<div class="empty">Нет данных за этот месяц</div>';
  }catch{el.innerHTML='<div class="empty">Не удалось загрузить</div>'}
}

/* ── HISTORY ── */
async function loadHistory(){
  const el=document.getElementById('page-history');
  el.innerHTML=spin();
  try{
    const rows=await api(`/api/transactions?year=${Y}&month=${M}`);
    if(!rows.length){el.innerHTML='<div class="empty">Нет транзакций за этот месяц</div>';return}
    let h='<div class="hist-list">';
    for(const r of rows){
      const dt=new Date(r.created_at);
      const ds=dt.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
      const s=r.type==='income'?'+':'−';
      const cm=r.comment?` · ${r.comment}`:'';
      const pm=r.payment_method==='card'?'КАРТА':'НАЛ';
      h+=`<div class="hist-item" data-id="${r.id}" data-type="${r.type}" data-cat="${r.category}" data-method="${r.payment_method}" data-amount="${r.amount}" data-comment="${r.comment||''}">
        <div class="hist-dot ${r.type==='income'?'inc':'exp'}"></div>
        <div class="hist-info"><div class="hist-cat">${r.category}${cm}</div><div class="hist-meta">${ds}</div></div>
        <div class="hist-right"><div class="hist-amt ${r.type==='income'?'inc':'exp'}">${s}€${fmt(r.amount)}</div><div class="hist-method">${pm}</div></div>
      </div>`;
    }
    h+='</div>';
    el.innerHTML=h;
    el.querySelectorAll('.hist-item').forEach(i=>i.addEventListener('click',()=>openEdit(i.dataset)));
  }catch{el.innerHTML='<div class="empty">Не удалось загрузить</div>'}
}

/* ── COMPARE ── */
async function loadCompare(){
  const el=document.getElementById('page-compare');
  el.innerHTML=spin();
  try{
    const d=await api(`/api/compare?year=${Y}&month=${M}`);
    const cur=d.current,prev=d.previous;
    const cLbl=MRU[parseInt(cur.month.split('-')[1])-1].substring(0,3).toUpperCase();
    const pLbl=MRU[parseInt(prev.month.split('-')[1])-1].substring(0,3).toUpperCase();

    const delta=(cv,pv,type)=>{
      if(!pv||cv===pv)return'';
      const d=cv-pv,p=Math.round(Math.abs(d)/pv*100);
      const up=d>0;
      const cls=type==='income'?(up?'up':'down'):(up?'down':'up');
      return`<span class="cmp-delta ${cls}">${up?'↑':'↓'}${p}%</span>`;
    };

    let h=`
    <div class="cmp-month-head">
      <span></span><span>${cLbl}</span><span>${pLbl}</span>
    </div>
    <div class="cmp-totals">
      <div class="cmp-total-row">
        <div class="cmp-total-label">Доходы ${delta(cur.income,prev.income,'income')}</div>
        <div class="cmp-total-val inc">€${fmt(cur.income)}</div>
        <div class="cmp-total-val inc">€${fmt(prev.income)}</div>
      </div>
      <div class="cmp-total-row">
        <div class="cmp-total-label">Расходы ${delta(cur.expense,prev.expense,'expense')}</div>
        <div class="cmp-total-val exp">€${fmt(cur.expense)}</div>
        <div class="cmp-total-val exp">€${fmt(prev.expense)}</div>
      </div>
      <div class="cmp-total-row">
        <div class="cmp-total-label">Баланс</div>
        <div class="cmp-total-val neu" style="color:${cur.income-cur.expense>=0?'var(--green)':'var(--red)'}">€${fmt(cur.income-cur.expense)}</div>
        <div class="cmp-total-val neu" style="color:${prev.income-prev.expense>=0?'var(--green)':'var(--red)'}">€${fmt(prev.income-prev.expense)}</div>
      </div>
    </div>`;

    const allExp=new Set([...Object.keys(cur.expense_by_cat||{}),...Object.keys(prev.expense_by_cat||{})]);
    if(allExp.size){
      h+='<div class="sec-title">Расходы по категориям</div><div class="cmp-cat-list">';
      for(const c of allExp){
        const cv=cur.expense_by_cat?.[c]||0,pv=prev.expense_by_cat?.[c]||0;
        h+=`<div class="cmp-cat-item"><div class="cmp-cat-row">
          <div class="cmp-cat-name">${c} ${delta(cv,pv,'expense')}</div>
          <div class="cmp-cat-val exp">€${fmt(cv)}</div>
          <div class="cmp-cat-val exp">€${fmt(pv)}</div>
        </div></div>`;
      }
      h+='</div>';
    }
    el.innerHTML=h;
  }catch{el.innerHTML='<div class="empty">Не удалось загрузить</div>'}
}

/* ── CATS ── */
function buildCats(id,type,sel,cb){
  const cats=type==='income'?INC_CATS:EXP_CATS;
  const g=document.getElementById(id);
  g.innerHTML='';
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(c===sel?' on':'');
    b.textContent=c;
    b.onclick=()=>{g.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');cb(c)};
    g.appendChild(b);
  });
}

/* ── ADD ── */
document.getElementById('fab').onclick=()=>{
  aType='income';aCat='Work';aMethod='card';
  document.getElementById('a-amount').value='';
  document.getElementById('a-comment').value='';
  document.getElementById('a-inc').className='seg-btn on-inc';
  document.getElementById('a-exp').className='seg-btn';
  document.getElementById('a-card').className='seg-btn on-dark';
  document.getElementById('a-cash').className='seg-btn';
  buildCats('a-cats',aType,aCat,c=>aCat=c);
  document.getElementById('ov-add').classList.add('open');
  setTimeout(()=>document.getElementById('a-amount').focus(),300);
};
document.getElementById('a-cancel').onclick=()=>document.getElementById('ov-add').classList.remove('open');
document.getElementById('ov-add').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open')};

document.getElementById('a-inc').onclick=()=>{aType='income';aCat='Work';document.getElementById('a-inc').className='seg-btn on-inc';document.getElementById('a-exp').className='seg-btn';buildCats('a-cats',aType,aCat,c=>aCat=c)};
document.getElementById('a-exp').onclick=()=>{aType='expense';aCat='Fixed';document.getElementById('a-exp').className='seg-btn on-exp';document.getElementById('a-inc').className='seg-btn';buildCats('a-cats',aType,aCat,c=>aCat=c)};
document.getElementById('a-card').onclick=()=>{aMethod='card';document.getElementById('a-card').className='seg-btn on-dark';document.getElementById('a-cash').className='seg-btn'};
document.getElementById('a-cash').onclick=()=>{aMethod='cash';document.getElementById('a-cash').className='seg-btn on-dark';document.getElementById('a-card').className='seg-btn'};

document.getElementById('a-save').onclick=async()=>{
  const amt=parseFloat(document.getElementById('a-amount').value);
  if(!amt||amt<=0){toast('Введи корректную сумму');return}
  const comment=document.getElementById('a-comment').value.trim()||null;
  try{
    await api('/api/transactions',{method:'POST',body:JSON.stringify({type:aType,category:aCat,amount:amt,payment_method:aMethod,comment})});
    document.getElementById('ov-add').classList.remove('open');
    clrCache();toast('✓ Сохранено');loadCurrent();
  }catch{toast('Ошибка при сохранении')}
};

/* ── EDIT ── */
function openEdit(d){
  eId=d.id;eType=d.type;eCat=d.cat;eMethod=d.method;
  document.getElementById('e-amount').value=d.amount;
  document.getElementById('e-comment').value=d.comment||'';
  if(eType==='income'){document.getElementById('e-inc').className='seg-btn on-inc';document.getElementById('e-exp').className='seg-btn'}
  else{document.getElementById('e-exp').className='seg-btn on-exp';document.getElementById('e-inc').className='seg-btn'}
  if(eMethod==='card'){document.getElementById('e-card').className='seg-btn on-dark';document.getElementById('e-cash').className='seg-btn'}
  else{document.getElementById('e-cash').className='seg-btn on-dark';document.getElementById('e-card').className='seg-btn'}
  buildCats('e-cats',eType,eCat,c=>eCat=c);
  document.getElementById('ov-edit').classList.add('open');
}
document.getElementById('e-cancel').onclick=()=>document.getElementById('ov-edit').classList.remove('open');
document.getElementById('ov-edit').onclick=e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open')};

document.getElementById('e-inc').onclick=()=>{eType='income';eCat='Work';document.getElementById('e-inc').className='seg-btn on-inc';document.getElementById('e-exp').className='seg-btn';buildCats('e-cats',eType,eCat,c=>eCat=c)};
document.getElementById('e-exp').onclick=()=>{eType='expense';eCat='Fixed';document.getElementById('e-exp').className='seg-btn on-exp';document.getElementById('e-inc').className='seg-btn';buildCats('e-cats',eType,eCat,c=>eCat=c)};
document.getElementById('e-card').onclick=()=>{eMethod='card';document.getElementById('e-card').className='seg-btn on-dark';document.getElementById('e-cash').className='seg-btn'};
document.getElementById('e-cash').onclick=()=>{eMethod='cash';document.getElementById('e-cash').className='seg-btn on-dark';document.getElementById('e-card').className='seg-btn'};

document.getElementById('e-save').onclick=async()=>{
  const amt=parseFloat(document.getElementById('e-amount').value);
  if(!amt||amt<=0){toast('Введи корректную сумму');return}
  const comment=document.getElementById('e-comment').value.trim()||null;
  try{
    await api(`/api/transactions/${eId}`,{method:'PUT',body:JSON.stringify({type:eType,category:eCat,amount:amt,payment_method:eMethod,comment})});
    document.getElementById('ov-edit').classList.remove('open');
    clrCache();toast('✓ Изменено');loadCurrent();
  }catch{toast('Ошибка')}
};
document.getElementById('e-del').onclick=async()=>{
  try{
    await api(`/api/transactions/${eId}`,{method:'DELETE'});
    document.getElementById('ov-edit').classList.remove('open');
    clrCache();toast('Удалено');loadCurrent();
  }catch{toast('Ошибка')}
};

/* ── TABS & MONTH ── */
function loadCurrent(){
  const t=document.querySelector('.tab.active').dataset.tab;
  if(t==='overview')loadOverview();
  else if(t==='breakdown')loadBreakdown();
  else if(t==='history')loadHistory();
  else if(t==='compare')loadCompare();
}

document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(`page-${t.dataset.tab}`).classList.add('active');
    loadCurrent();
  }
});

document.getElementById('prev-m').onclick=()=>{M--;if(M<1){M=12;Y--}clrCache();updMonth();loadCurrent()};
document.getElementById('next-m').onclick=()=>{const n=new Date();if(Y===n.getFullYear()&&M===n.getMonth()+1)return;M++;if(M>12){M=1;Y++}clrCache();updMonth();loadCurrent()};

updMonth();loadOverview();
</script>
